<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4a574">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LotterLearner">
    <title>LotterLearner — Spanish Vocabulary Trainer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-input: #1a1a24;
            --text-primary: #e8e6e3;
            --text-muted: #6b7280;
            --accent-gold: #d4a574;
            --accent-coral: #e07a5f;
            --success: #4ade80;
            --error: #f87171;
            --border: #2a2a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(212, 165, 116, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(224, 122, 95, 0.06) 0%, transparent 50%);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent-gold);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-style: italic;
        }

        .main-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .spanish-word {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 500;
            color: var(--accent-gold);
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.1) 0%, rgba(224, 122, 95, 0.05) 100%);
            border-radius: 12px;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        input[type="text"] {
            flex: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            padding: 1rem 1.25rem;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.15);
        }

        input[type="text"].correction-mode {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.25);
        }

        input[type="text"].correction-mode:focus {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.35);
        }

        button {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 1.1rem;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-coral) 100%);
            border: none;
            border-radius: 10px;
            color: var(--bg-deep);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }

        .btn-reset:hover {
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-clear {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
        }

        .btn-clear:hover {
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3);
        }

        .btn-add {
            padding: 1rem 1.5rem;
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: var(--bg-deep);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .feedback {
            text-align: center;
            font-size: 1.25rem;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feedback.visible {
            opacity: 1;
        }

        .feedback.correct {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
        }

        .feedback.incorrect {
            background: rgba(248, 113, 113, 0.1);
            color: var(--error);
        }

        .feedback.typo {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .word-list {
            margin-top: 2rem;
            width: 100%;
            max-width: 700px;
        }

        .word-list h2 {
            font-size: 1.25rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
            text-align: center;
        }

        .word-list .btn-reset,
        .word-list .btn-clear,
        .word-list .btn-add {
            display: block;
            margin: 0 auto 1rem auto;
            width: 140px;
        }

        .words-grid {
            display: grid;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .word-row {
            display: grid;
            grid-template-columns: 140px 40px 50px 60px 1fr;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
            align-items: center;
        }

        .word-english {
            color: var(--text-primary);
            font-weight: 500;
        }

        .word-age, .word-learned, .word-priority {
            color: var(--text-muted);
            text-align: center;
        }

        .word-guesses {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }

        .guess-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .guess-correct {
            background: rgba(74, 222, 128, 0.2);
        }

        .guess-incorrect {
            background: rgba(248, 113, 113, 0.2);
        }

        .empty-banner {
            display: none;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(74, 138, 222, 0.15) 0%, rgba(47, 37, 155, 0.05) 100%);
            border: 1px solid rgba(81, 132, 214, 0.3);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
        .empty-banner.visible {
            display: block;
        }

        .empty-banner h2 {
            color: var(--text-muted);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .empty-banner p {
            color: var(--text-muted);
        }

        .complete-banner {
            display: none;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.15) 0%, rgba(74, 222, 128, 0.05) 100%);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .complete-banner.visible {
            display: block;
        }

        .complete-banner h2 {
            color: var(--success);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .complete-banner p {
            color: var(--text-muted);
        }

        .header-row {
            display: grid;
            grid-template-columns: 140px 40px 50px 60px 1fr;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .header-row span {
            text-align: center;
        }

        .header-row span:first-child {
            text-align: left;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 0.3s ease-in-out;
        }

        .empty-state {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .empty-state.visible {
            display: block;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .btn-load-vocab {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 1.25rem;
            padding: 1.25rem 2.5rem;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-coral) 100%);
            border: none;
            border-radius: 12px;
            color: var(--bg-deep);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-load-vocab:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.4);
        }

        .main-card.hidden, .word-list.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>LotterLearner</h1>
        <p class="subtitle" id="WelcomeText">Hello Georgia, what would you like to learn today?</p>
    </header>

    <div class="main-card" id="mainCard">
        <div class="complete-banner" id="completeBanner">
            <h2>🎉 ¡Felicidades!</h2>
            <p>You've mastered all the words!</p>
        </div>

        <div class="empty-banner" id="emptyBanner">
            <h2>⏳ Empty Vocab ⏳</h2>
            <p>Add some words to your vocab to get started ...</p>
        </div>

        <div class="spanish-word" id="spanishWord">Loading...</div>

        <div class="input-group">
            <input type="text" id="answerInput" placeholder="Type the Spanish translation..." autocomplete="off">
            <button id="submitBtn">Check</button>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="turnCount">0</div>
                <div>Turns</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="correctCount">0</div>
                <div>Correct</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="masteredCount">0/14</div>
                <div>Mastered</div>
            </div>
        </div>
    </div>

    <div class="word-list" id="wordList">

        <a href="create-vocab.html" class="btn-add">Add Vocab</a>
        <h2>Vocabulary Progress</h2>

        <div class="header-row">
            <span>Word</span>
            <span>Age</span>
            <span>Learn</span>
            <span>Priority</span>
            <span>Guesses</span>
        </div>
        <div class="words-grid" id="wordsGrid"></div>
        <br>
        <button id="resetBtn" class="btn-reset">Reset Vocab</button>
        <button id="clearBtn" class="btn-clear">Clear Vocab</button>

    </div>

    <script>
        const DB_NAME = "Vocab"
        const DB_VERSION = 1  // Must be a number, not a string

        class Database {
            constructor() {
                this.db = null;
            }

            async init() {
                if (this.db) return this.db; // prevent reopening

                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);  // Use the variable, not a string

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        db.createObjectStore("words", { keyPath: "english" });
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this.db);
                    };

                    request.onerror = () => reject(request.error);
                });
            }

            getStore(storeName, mode) {  // Added mode parameter
                const tx = this.db.transaction(storeName, mode);
                return tx.objectStore(storeName);
            }

            async putWord(word) {
                const store = this.getStore("words", "readwrite");

                return new Promise((resolve, reject) => {
                    const request = store.put(word);  // put = insert or update
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getWords() {
                const store = this.getStore("words", "readonly");

                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clear() {
                console.log("DELETING DB")
                // Close the underlying IndexedDB connection
                if (this.db) {
                    this.db.close();
                    this.db = null;
                }
                const deleteRequest = indexedDB.deleteDatabase(DB_NAME);

                deleteRequest.onsuccess = () => {
                    console.log("Deleted");
                    vocab = new Vocab([]);
                    render();
                };

                deleteRequest.onerror = () => {
                    console.error("Delete failed");
                };

                deleteRequest.onblocked = () => {
                    console.warn("Blocked — close all tabs using this DB");
                };

            }
        }

        const db = new Database();

        // Word class
        class Word {
            constructor(english, translations, age, guesses) {
                this.english = english;
                this.translations = translations
                this.translations = this.translations.map(t => t.toLowerCase().trim());
                this.age = age;
                this.guesses = guesses;
            }

            get learnedness() {
                return this.guesses.slice(-3).filter(g => g === true).length;
            }

            get priority() {
                if (this.age === 0) return 0;
                if (this.isMastered) return 0;
                if (this.learnedness === 0) return 1;
                return 1 / (Math.pow(4, this.learnedness) / this.age);
            }

            get isMastered() {
                const lastThree = this.guesses.slice(-5);
                return lastThree.length === 5 && lastThree.every(g => g === true);
            }

            reset = function() {
                this.age = 0
                this.guesses = []
            }

            store = async function() {
                let word_db  = {
                    english: this.english,
                    translations: this.translations,
                    guesses: this.guesses,
                    age: this.age
                }
                await db.putWord(word_db)
            }
        }

        // Vocab class
        class Vocab {
            constructor(words) {
                this.words = words;
            }

            nextWord() {
                const maxPriority = Math.max(...this.words.map(w => w.priority));
                const candidates = this.words.filter(w => w.priority === maxPriority);
                return candidates[Math.floor(Math.random() * candidates.length)];
            }

            incrementAge() {
                this.words.forEach(w => w.age++);
            }

            get isEmpty() {
                return this.words.length === 0
            }

            get isComplete() {
                if (this.isEmpty) {
                    return False
                } else {
                    return this.words.every(w => w.isMastered);
                }

            }

            get masteredCount() {
                return this.words.filter(w => w.isMastered).length;
            }

            reset = function() {
                console.log("RESETTING")
                this.words.forEach(word => word.reset())
            }

            store = async function() {
                // Store each word
                this.words.forEach(word => word.store())
            }
        }

        function isApprovedInput(input, allowedOptions, threshold = 0.75) {
        const normalize = s => s.toLowerCase().trim();

        return allowedOptions.some(option =>
            similarity(normalize(input), normalize(option)) >= threshold
        );
        }

        function levenstein(a, b) {
            if (a === b) return 1;

            if (!a.length || !b.length) return 0;

            const matrix = Array.from({ length: b.length + 1 }, (_, i) =>
                Array.from({ length: a.length + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0)
            );

            for (let i = 1; i <= b.length; i++)
                for (let j = 1; j <= a.length; j++)
                    matrix[i][j] = b[i-1] === a[j-1]
                        ? matrix[i-1][j-1]
                        : 1 + Math.min(matrix[i-1][j], matrix[i][j-1], matrix[i-1][j-1]);

            const maxLen = Math.max(a.length, b.length);
            return 1 - matrix[b.length][a.length] / maxLen;
        }

        function isTypo(answer, translations) {
            return translations.some(t => (levenstein(answer, t) >= 0.75))
        }



        // Get RGB color based on priority
        function getPriorityColor(priority, minP, maxP) {
            if (maxP === minP) return 'rgb(255, 255, 0)';
            const d = (priority - minP) / (maxP - minP);
            const r = Math.round(255 * d);
            const g = 255 - Math.round(255 * d);
            return `rgb(${r}, ${g}, 0)`;
        }

        // DOM elements
        const englishWordEl = document.getElementById('spanishWord');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const feedbackEl = document.getElementById('feedback');
        const turnCountEl = document.getElementById('turnCount');
        const correctCountEl = document.getElementById('correctCount');
        const masteredCountEl = document.getElementById('masteredCount');
        const wordsGridEl = document.getElementById('wordsGrid');
        const emptyBannerEl = document.getElementById('emptyBanner');
        const completeBannerEl = document.getElementById('completeBanner');
        const resetBtn = document.getElementById('resetBtn')
        const welcomeTextEl = document.getElementById('WelcomeText')

        // Birthday check for Georgia
        const today = new Date();
        if (today.getMonth() === 2 && today.getDate() === 13) {
            welcomeTextEl.textContent = "Happy Birthday Georgia 🎉 What would you like to learn today?";
        } else if (today.getMonth() === 11 && today.getDate() === 25) {
            welcomeTextEl.textContent = "Merry Christmas Georgia 🎄 What would you like to learn today?";
        } else if (today.getMonth() === 0 && today.getDate() === 1) {
            welcomeTextEl.textContent = "Happy New Year Georgia! 🎆 What would you like to learn this year?";
        }

        // Event listeners
        submitBtn.addEventListener('click', checkAnswer);
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        // createBtn.addEventListener("click", createVocab)
        resetBtn.addEventListener('click', resetVocab)
        clearBtn.addEventListener("click", clearVocab)


        function render() {
            // Check if vocab is empty
            console.log("rendering", vocab.words.length, "words")

            // Initialize the app now that vocab is loaded
            // mainCardEl.classList.add('visible');
            // wordListEl.classList.add('visible');
            updateStats();
            renderWordList();
            nextTurn();

        }

        function showFeedback(message, type) {
            feedbackEl.textContent = message;
            feedbackEl.className = `feedback visible ${type}`;
        }

        function hideFeedback() {
            feedbackEl.className = 'feedback';
        }

        function updateStats() {
            turnCountEl.textContent = turnCount;
            correctCountEl.textContent = correctCount;
            masteredCountEl.textContent = `${vocab.masteredCount}/${vocab.words.length}`;
        }

        function compareWords(a, b) {
            return b.priority - a.priority;
        }

        function renderWordList() {
            vocab.words.sort(compareWords);
            const priorities = vocab.words.map(w => w.priority);
            const minP = Math.min(...priorities);
            const maxP = Math.max(...priorities);

            wordsGridEl.innerHTML = vocab.words.map(word => {
                const color = getPriorityColor(word.priority, minP, maxP);
                const guessesHtml = word.guesses.map(g =>
                    `<div class="guess-dot ${g ? 'guess-correct' : 'guess-incorrect'}">${g ? '✓' : '✗'}</div>`
                ).join('');

                return `
                    <div class="word-row" style="border-left: 3px solid ${color}">
                        <div class="word-english">${word.english}</div>
                        <div class="word-age">${word.age}</div>
                        <div class="word-learned">${word.learnedness}/5</div>
                        <div class="word-priority">${word.priority.toFixed(2)}</div>
                        <div class="word-guesses">${guessesHtml || '<span style="color: var(--text-muted)">—</span>'}</div>
                    </div>
                `;
            }).join('');
        }
        function hideEl (el) {
            el.classList.remove('visible')
            el.classList.add('hidden')
        }

        function showEl (el) {
            el.classList.remove('hidden')
            el.classList.add('visible')
        }

        function nextTurn() {
            if (vocab.isEmpty) {
                showEl(emptyBannerEl)
                hideEl(englishWordEl)
                hideEl(answerInput)
                hideEl(submitBtn)
                return;
            }

            if (vocab.isComplete) {
                showEl(completeBannerEl)
                hideEl(englishWordEl)
                hideEl(answerInput)
                hideEl(submitBtn)
                hideFeedback();
                CongratulationsMP4.play()
                return;
            }

            hideEl(emptyBannerEl)
            hideEl(completeBannerEl)
            showEl(englishWordEl)
            showEl(answerInput)
            showEl(submitBtn)
            hideFeedback();

            currentWord = vocab.nextWord();
            englishWordEl.textContent = currentWord.english;
            answerInput.value = '';
            answerInput.focus();
            isTypoRetry = false;
            correctionMode = false;
            answerInput.classList.remove('correction-mode');
        }

        function good_audio() {
            bad_streak = 0
            streak++
            if (streak === 3) {
                ProudMP4.play();
            } else if (streak === 5) {
                ggMP4.play()
                streak = 0
            } else {
                GoodMP4.play()
            }
        }

        function bad_audio() {
            streak = 0
            bad_streak++
            if (bad_streak === 3) {
                PayAttentionMP4.play();
            } else if (bad_streak === 5) {
                OhDearMP4.play()
                bad_streak = 0
            }
        }

        async function checkAnswer() {
            const answer = answerInput.value.toLowerCase().trim();

            if (!answer) {
                answerInput.classList.add('shake');
                setTimeout(() => answerInput.classList.remove('shake'), 300);
                return;
            }

            const isCorrect = currentWord.translations.includes(answer);

            if (!isCorrect && !isTypoRetry && isTypo(answer, currentWord.translations)) {
                // Typo detected - give them one chance to check
                isTypoRetry = true;
                showFeedback('🤔 Check your spelling...', 'typo');
                answerInput.classList.add('shake');
                setTimeout(() => answerInput.classList.remove('shake'), 300);
                answerInput.select();
                return;
            }

            // If in correction mode, check if they typed it correctly (no stats affected)
            if (correctionMode) {
                if (isCorrect) {
                    correctionMode = false;
                    answerInput.classList.remove('correction-mode');
                    showFeedback('✅ Good, now you know it!', 'correct');
                    englishWordEl.classList.add('pulse');
                    setTimeout(() => englishWordEl.classList.remove('pulse'), 300);
                    setTimeout(nextTurn, 1000);
                    answerInput.placeholder = "Type the Spanish translation..."

                } else {
                    // Still wrong, shake and let them try again
                    answerInput.classList.add('shake');
                    setTimeout(() => answerInput.classList.remove('shake'), 300);
                    showFeedback(`❌ Type it correctly: ${currentWord.translations.join(' / ')}`, 'incorrect');
                    answerInput.value = '';
                    answerInput.focus();
                }
                return;
            }

            // Normal answer checking (not in correction mode)
            if (isCorrect) {
                good_audio()
                currentWord.guesses.push(true);
                correctCount++;

                const otherTranslations = currentWord.translations.filter(t => t !== answer);
                let message = '✅ Correct!';
                if (otherTranslations.length > 0) {
                    message += ` (also: ${otherTranslations.join(', ')})`;
                }
                showFeedback(message, 'correct');
                englishWordEl.classList.add('pulse');
                setTimeout(() => englishWordEl.classList.remove('pulse'), 300);

                vocab.incrementAge();
                currentWord.age = 0;
                turnCount++;

                await vocab.store()

                updateStats();
                renderWordList();

                if (streak === 5 || bad_streak === 5) {
                    setTimeout(nextTurn, 3300);
                } else if (streak === 3 || bad_streak === 3) {
                    setTimeout(nextTurn, 2300);
                } else {
                    setTimeout(nextTurn, 1000);
                }
            } else {
                // Wrong answer - record it, then enter correction mode
                bad_audio()
                currentWord.guesses.push(false);

                vocab.incrementAge();
                currentWord.age = 0;
                turnCount++;

                await vocab.store()

                updateStats();
                renderWordList();

                // Enter correction mode - user must type the correct answer
                correctionMode = true;
                answerInput.classList.add('correction-mode');
                showFeedback(`❌ Type it correctly: ${currentWord.translations.join(' / ')}`, 'incorrect');
                englishWordEl.classList.add('shake');
                setTimeout(() => englishWordEl.classList.remove('shake'), 300);
                answerInput.value = '';
                answerInput.focus();
                answerInput.placeholder = `${currentWord.translations.join(' / ')}`
            }
        }

        // Create a vocab in the db
        async function createVocab() {
            const NOUNS_DATA = [
                ["the beginner", ["el principante"]],
                ["the wall", ["el muro", "la pared"]],
                ["the affair", ["el asunto"]],
                ["the funds", ["los fondos"]],
                ["the campaign", ["la campaña"]],
                ["the threat", ["la amenzana"]],
                ["the meeting", ["la reunión"]],
                ["the project", ["el proyecto"]],
                ["the country", ["el país"]],
                ["the leaders", ["los líderes"]],
                ["denmark", ["Dinamarca"]],
                ["sweden", ["Suecia"]],
                ["norway", ["Noruega"]],
                ["lithuania", ["Lituania"]],
            ];
            words = NOUNS_DATA.map(([english, translations]) => new Word(
                english=english,
                translations=translations,
                age=0,
                guesses=[]
            ));
            vocab = new Vocab(words=words)
            console.log("creating vocab", vocab.words.length)
            await vocab.store()
            console.log("complete, rendering", vocab.words.length)
            render()
        }

        // Reset the vocab in the db
        async function resetVocab() {
            vocab.reset()
            await vocab.store()
            turnCount = 0
            correctCount = 0
            streak = 0
            bad_streak = 0
            render()
        }

        // Completely delete the vocab in the DB
        async function clearVocab() {
            await db.clear()
            render()
        }

        async function loadVocab() {
            await db.init();  // Must initialize DB first!
            const words_db = await db.getWords();
            console.log("wordsdb", words_db)
            const words = words_db.map(w => new Word(
                english=w.english,
                translations=w.translations,
                age=w.age,
                guesses=w.guesses
            ));
            console.log("words", words)
            vocab = new Vocab(words);
            render()
        }

        // State
        let vocab = new Vocab(words=[]);
        let currentWord = null;
        let turnCount = 0;
        let correctCount = 0;
        let isTypoRetry = false;
        let streak = 0
        let bad_streak = 0
        let correctionMode = false;  // Track if user needs to type correct answer

        // Audio
        const ggMP4 = new Audio('audio/gg.mp4');
        const GoodMP4 = new Audio('audio/good.mp4');
        const NiceMP4 = new Audio('audio/nice.mp4');
        const OhDearMP4 = new Audio('audio/oh-dear.mp4');
        const PayAttentionMP4 = new Audio('audio/pay-attention.mp4');
        const ProudMP4 = new Audio('audio/proud.mp4');
        const WellDoneMP4 = new Audio('audio/well-done.mp4');
        const CongratulationsMP4 = new Audio('audio/congratulations.mp4')


        // Initialize the app (async)
        async function init() {
            await db.init()
            await loadVocab();
        }

        init();

    </script>
