<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dankhi — Create Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-input: #1a1a24;
            --text-primary: #e8e6e3;
            --text-muted: #6b7280;
            --accent-gold: #d4a574;
            --accent-coral: #e07a5f;
            --success: #4ade80;
            --error: #f87171;
            --border: #2a2a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(212, 165, 116, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(224, 122, 95, 0.06) 0%, transparent 50%);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent-gold);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-style: italic;
        }

        .main-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .instructions {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .instructions code {
            background: var(--bg-input);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-gold);
        }

        .csv-input {
            width: 100%;
            min-height: 300px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            padding: 1rem;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            resize: vertical;
            margin-bottom: 1.5rem;
        }

        .csv-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.15);
        }

        .csv-input::placeholder {
            color: var(--text-muted);
        }

        .button-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 1.1rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-coral) 100%);
            color: var(--bg-deep);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-gold);
        }

        .feedback {
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .feedback.visible {
            display: block;
        }

        .feedback.success {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
        }

        .feedback.error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--error);
        }
    </style>
</head>
<body>
    <header>
        <h1>Dankhi</h1>
        <p class="subtitle">Create Vocabulary</p>
    </header>

    <div class="main-card">
        <div class="instructions">
            <p>Paste your vocabulary as CSV. Each line should have:</p>
            <p><code>english word, translation1, translation2, ...</code></p>
            <p style="margin-top: 0.5rem;">Example:</p>
            <p><code>the wall, el muro, la pared</code></p>
        </div>

        <textarea
            id="csvInput"
            class="csv-input"
            placeholder="the beginner, el principante
the wall, el muro, la pared
the meeting, la reunión
..."
        ></textarea>

        <div class="button-row">
            <a href="dhanki-webapp.html" class="btn btn-secondary">Cancel</a>
            <button id="saveBtn" class="btn btn-primary">Save Vocabulary</button>
        </div>

        <div id="feedback" class="feedback"></div>
    </div>

    <script>
        const DB_NAME = "Vocab";
        const DB_VERSION = 1;

        class Database {
            constructor() {
                this.db = null;
            }

            async init() {
                if (this.db) return this.db;

                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains("words")) {
                            db.createObjectStore("words", { keyPath: "english" });
                        }
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this.db);
                    };

                    request.onerror = () => reject(request.error);
                });
            }

            getStore(storeName, mode) {
                const tx = this.db.transaction(storeName, mode);
                return tx.objectStore(storeName);
            }

            async putWord(word) {
                const store = this.getStore("words", "readwrite");

                return new Promise((resolve, reject) => {
                    const request = store.put(word);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clear() {
                const store = this.getStore("words", "readwrite");

                return new Promise((resolve, reject) => {
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        const db = new Database();
        const csvInput = document.getElementById('csvInput');
        const saveBtn = document.getElementById('saveBtn');
        const feedbackEl = document.getElementById('feedback');

        function showFeedback(message, type) {
            feedbackEl.textContent = message;
            feedbackEl.className = `feedback visible ${type}`;
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const words = [];

            for (const line of lines) {
                const trimmedLine = line.trim();
                if (!trimmedLine) continue;

                const parts = trimmedLine.split(',').map(p => p.trim());
                if (parts.length < 2) {
                    console.warn('Skipping invalid line:', line);
                    continue;
                }

                const english = parts[0];
                const translations = parts.slice(1).filter(t => t.length > 0);

                if (english && translations.length > 0) {
                    words.push({
                        english: english,
                        translations: translations.map(t => t.toLowerCase().trim()),
                        age: 0,
                        guesses: []
                    });
                }
            }

            return words;
        }

        async function saveVocabulary() {
            const text = csvInput.value.trim();

            if (!text) {
                showFeedback('Please enter some vocabulary', 'error');
                return;
            }

            const words = parseCSV(text);

            if (words.length === 0) {
                showFeedback('No valid words found. Check the format.', 'error');
                return;
            }

            try {
                await db.init();

                // Clear existing words and add new ones
                await db.clear();

                for (const word of words) {
                    await db.putWord(word);
                }

                showFeedback(`Saved ${words.length} words! Redirecting...`, 'success');

                setTimeout(() => {
                    window.location.href = 'dhanki-webapp.html';
                }, 1000);

            } catch (error) {
                console.error('Save failed:', error);
                showFeedback('Failed to save: ' + error.message, 'error');
            }
        }

        saveBtn.addEventListener('click', saveVocabulary);
    </script>
</body>
</html>
